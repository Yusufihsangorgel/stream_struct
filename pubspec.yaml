name: stream_struct
description: >-
  Stream an LLM's structured output as it arrives: tolerant partial JSON parsing
  that fills in the typed object token by token. Provider-agnostic, you bring
  the token stream.
version: 0.1.2
repository: https://github.com/Yusufihsangorgel/stream_struct
issue_tracker: https://github.com/Yusufihsangorgel/stream_struct/issues
topics:
  - llm
  - ai
  - json
  - streaming
  - structured-output

environment:
  sdk: ^3.5.0

dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
