name: stream_struct
description: >-
  Turn a language model's token stream into a stream of the structured object as
  it fills in. Tolerant incremental JSON parsing plus OpenAI, Anthropic, and
  Gemini delta adapters, so a UI can render structured output while it arrives.
version: 0.1.0
repository: https://github.com/Yusufihsangorgel/stream_struct
issue_tracker: https://github.com/Yusufihsangorgel/stream_struct/issues
topics:
  - llm
  - ai
  - json
  - streaming
  - structured-output

environment:
  sdk: ^3.5.0

dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
